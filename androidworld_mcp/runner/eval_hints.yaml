SystemBrightnessMinVerify:
  verify: |
    "设置 → 显示 → 亮度"页，截图证明亮度滑块在最左端。
  evidence: 1 张亮度页截图

SystemCopyToClipboard:
  exec_hint: |
    没有"复制"快捷入口。建议：用 ai_set_text 把目标文本塞进任意输入框（搜索框/便签皆可），
    然后长按 → 全选 → 复制。注意验证阶段需要重新打开一个能粘贴的输入框。
  verify: |
    打开通讯录"新建联系人"页（任意有输入框的页面也行），长按某输入框 → 选"粘贴"，
    截图证明粘贴出来的内容文字 == "{clipboard_content}"（允许少量空白差异）。
  evidence: 1 张粘贴后的截图

SystemWifiTurnOn:
  verify: |
    "设置 → WLAN/Wi-Fi"页，截图证明顶部 Wi-Fi 开关在 ON 位置（不强制要求已连接到网络）。
  evidence: 1 张 Wi-Fi 设置页截图

SystemWifiTurnOnVerify:
  verify: |
    "设置 → WLAN/Wi-Fi"页，截图证明顶部 Wi-Fi 开关在 ON 位置。
  evidence: 1 张 Wi-Fi 设置页截图

SystemWifiTurnOff:
  verify: |
    "设置 → WLAN/Wi-Fi"页，截图证明顶部 Wi-Fi 开关在 OFF 位置，且无"附近网络"列表。
  evidence: 1 张 Wi-Fi 设置页截图

SystemWifiTurnOffVerify:
  verify: |
    "设置 → WLAN/Wi-Fi"页，截图证明顶部 Wi-Fi 开关在 OFF 位置。
  evidence: 1 张 Wi-Fi 设置页截图

TurnOnWifiAndOpenApp:
  exec_hint: |
    分两步：先确保 Wi-Fi 已 ON（设置或快捷面板），再 open_app {app_name}。
    顺序不能反——任务模板要求先开 Wi-Fi 再开 app。
  verify: |
    1) 截图：设置→Wi-Fi 页开关 ON。
    2) 截图：前台是 {app_name}。
  evidence: 2 张截图

TurnOffWifiAndTurnOnBluetooth:
  exec_hint: |
    顺序：先关 Wi-Fi，再开蓝牙。两个动作之间务必各做一次截图确认。
  verify: |
    1) 截图：设置→Wi-Fi 页开关 OFF。
    2) 截图：设置→蓝牙 页开关 ON。
  evidence: 2 张截图

AudioRecorderRecordAudio:
  exec_hint: |
    打开 Audio Recorder（包名 com.dimowner.audiorecorder）。
    如果首次打开有权限弹窗（麦克风/存储），全部允许。
    找到录音按钮（通常是底部圆形按钮），点击开始录音，等待至少 3 秒，
    再次点击停止录音。录音会自动保存。
  verify: |
    录音完成后，检查 App 内录音列表，截图证明出现了一条新录音记录（有时长显示）。
  evidence: 1 张录音列表截图

MarkorCreateNote:
  exec_hint: |
    打开 Markor（包名 net.gsantner.markor）。如果是首次启动会有引导页，
    一直点右下角的箭头（next）跳过引导直到进入主界面。
    进入 Notebook 文件浏览器后，点右下角 + (FAB) 按钮创建新文件。
    文件名输入 "{title}"（不含扩展名，Markor 自动加 .md）。
    在编辑器里输入内容 "{content}"。按返回键自动保存。
  verify: |
    回到 Markor 文件列表，截图证明存在文件名为 "{title}" 的条目。
    点击打开该文件，截图证明内容包含 "{content}"。
  evidence: 2 张截图（文件列表 + 文件内容）

MarkorCreateFolder:
  exec_hint: |
    打开 Markor，进入 Notebook 文件浏览器。
    点右下角 + 按钮，选择"文件夹/Folder"选项（不是新建文件）。
    输入文件夹名称 "{folder_name}"，确认创建。
  verify: |
    回到 Markor 文件列表，截图证明存在名为 "{folder_name}" 的文件夹条目。
  evidence: 1 张文件列表截图

SimpleCalendarAddOneEvent:
  exec_hint: |
    打开 Simple Calendar Pro（包名 com.simplemobiletools.calendar.pro）。
    导航到 {date} 对应的日期（May 5, 2026），点击该日期。
    点 + 按钮创建新事件。填写标题 "{title}"，
    设置开始时间 {start_time}，结束时间 {end_time}。
    保存事件。
  verify: |
    回到日历视图，在 {date} 对应日期上应该能看到 "{title}" 事件标记。
    点击该日期查看事件详情，截图证明标题、日期、时间都正确。
  evidence: 1 张事件详情截图

ExpenseAddSingle:
  exec_hint: |
    打开 Pro Expense（包名 com.arduia.expense）。
    如有引导页先跳过。找到添加按钮（通常是底部 + 或 FAB），
    输入金额 {amount}，选择类别 "{category}"（如果有分类选择器）。
    保存条目。
  verify: |
    回到费用列表主页，截图证明出现了一条金额为 {amount} 的条目。
  evidence: 1 张费用列表截图

RecipeAddSingleRecipe:
