  evidence: 1 张设置页截图

SystemBluetoothTurnOffVerify:
  verify: |
    "设置 → 蓝牙"页，截图证明顶部蓝牙开关在 OFF 位置。
  evidence: 1 张设置页截图

SystemBrightnessMax:
