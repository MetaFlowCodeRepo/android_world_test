    【阶段二：复制图片】打开 Simple Gallery Pro（包名 com.simplemobiletools.gallery.pro）。
    找到 DCIM 文件夹中最新的照片，使用"复制到/Copy to"功能，
    将照片复制到 Download 文件夹。保持文件名不变。
  verify: |
    在 Simple Gallery Pro 中打开 Download 文件夹，
    截图证明照片副本已存在于此。
  evidence: 1 张 Download 文件夹截图

SimpleSmsSend:
  exec_hint: |
    打开 Simple SMS Messenger（包名 com.simplemobiletools.smsmessenger）。
    点击新建消息按钮（+ 或 FAB）。
    在收件人栏输入 {number}。
    在消息内容框输入 "{message}"。
    点击发送按钮。
    注意：短信可能发送失败（没有真实 SIM 卡），
    只要消息出现在对话列表中即可视为成功。
  verify: |
    截图证明对话列表中出现了发给 {number} 的消息，
    内容包含 "{message}"。
  evidence: 1 张对话截图

SimpleSmsSendClipboardContent:
  exec_hint: |
    这是两阶段任务：
    【阶段一：复制到剪贴板】将 "{clipboard_content}" 复制到剪贴板。
    【阶段二：发送短信】打开 Simple SMS Messenger，
    新建消息给 {number}，在消息框中粘贴剪贴板内容，发送。
  verify: |
    截图证明对话中出现了发给 {number} 的消息，
    内容为 "{clipboard_content}"。
  evidence: 1 张对话截图

VlcCreatePlaylist:
  exec_hint: |
    打开 VLC（包名 org.videolan.vlc）。
    找到播放列表管理入口（通常在 Audio/Video 标签下，或侧边栏 Playlists）。
    创建新播放列表，命名为 "{playlist_title}"。
    添加设备上任意可用的媒体文件。
  verify: |
    在 VLC 的 Playlists 页面截图，证明存在名为 "{playlist_title}" 的播放列表。
  evidence: 1 张播放列表截图

VlcCreateTwoPlaylists:
  exec_hint: |
    打开 VLC。分别创建两个播放列表：
    1) 第一个命名为 "Playlist A"
    2) 第二个命名为 "Playlist B"
    每个都添加设备上的一些可用媒体文件。
  verify: |
    在 VLC 的 Playlists 页面截图，证明同时存在 "Playlist A" 和 "Playlist B"。
  evidence: 1 张播放列表截图

MarkorCreateNoteAndSms:
  exec_hint: |
    这是一个组合任务：
    【步骤一】在 Markor 中创建笔记 "{file_name}"，内容为 "{text}"。
    【步骤二】可以用 Markor 的分享功能将内容分享到 Simple SMS Messenger，
    或者手动复制内容后打开 Simple SMS Messenger 发送。
    收件人号码：{number}，消息内容就是笔记内容。
  verify: |
    1) 截图 Markor 文件列表，证明 "{file_name}" 存在。
    2) 截图 Simple SMS Messenger 对话，证明发给 {number} 的消息内容为 "{text}"。
  evidence: 2 张截图（Markor + SMS）
