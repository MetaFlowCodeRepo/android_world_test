SimpleCalendarDeleteOneEvent:
  exec_hint: |
    这是两阶段任务：
    【阶段一：创建数据】先在 Simple Calendar Pro 中创建一个事件：
      日期 2026-06-15，时间 14:00，标题 "Dentist Appointment"，描述 "Regular checkup"，时长 60 分钟。
    创建完成后截图确认事件已存在。
    【阶段二：执行删除】删除 2026-06-15 14:00 标题为 "Dentist Appointment" 的事件。
  verify: |
    导航到 2026-06-15 这一天，截图证明该日期上已经没有任何事件
    （或不再出现 "Dentist Appointment"）。
