    这是两阶段任务：
    【阶段一：创建数据】在 Simple Calendar Pro 中为 2026-07-10 创建两个事件：
      1) 09:00 "Morning Standup" 时长 30 分钟
      2) 15:00 "Code Review" 时长 60 分钟
    每创建一个事件后截图确认。
    【阶段二：执行删除】删除 2026-07-10 当天的所有事件。
  verify: |
    导航到 2026-07-10 这一天，截图证明该日期上已经没有任何事件。
