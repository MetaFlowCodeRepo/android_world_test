    打开 Broccoli（包名 com.flauschcode.broccoli）。
    点击添加按钮（+ 或 FAB）新建食谱。
    输入标题 "{title}"，在描述/说明字段输入 "{description}"。
    保存食谱。
  verify: |
    回到食谱列表，截图证明出现了标题为 "{title}" 的条目。
    点击进入详情，截图证明描述包含 "{description}"。
  evidence: 2 张截图（列表 + 详情）

SimpleDrawProCreateDrawing:
  exec_hint: |
    打开 Simple Draw Pro（包名 com.simplemobiletools.draw.pro）。
    在画布上用 swipe 绘制至少两笔（两条线段），
    例如 swipe(0.2, 0.3, 0.8, 0.3) 和 swipe(0.5, 0.2, 0.5, 0.8)。
    然后点击保存按钮（通常是顶部工具栏的保存图标 💾）。
  verify: |
    保存后截图，证明画布上有明显的绘制痕迹（至少两笔），
    且保存成功（没有错误提示，或者能看到"已保存"toast）。
  evidence: 1 张画布截图

OpenAppMarkor:
